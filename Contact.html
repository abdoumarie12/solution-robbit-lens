<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil-Robbie Lens Photographie</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        
        <img src="images/logo.png" alt="logo de Robbie Lens">

        <nav>
            <ul>
                <li>
                    <a href="index.html">
                        Accueil
                    </a>
                </li>

                <li>
                    <a href="a-propos.html">
                        À propos
                    </a>
                </li>
                <li>
                    <a href="Contact.html">
                        Contact
                    </a>
                </li>
            </ul>
        </nav>
    </header>

   <main class="abdou">
    <section>
    <div>
           <form>
                <table class="rafiou">
                    
                        <div>
                            <label for="Nom de Famile">Non de Famile : 
                            <input type="text" name="Nom de Famile" id="Nom de Famile" placeholder="Nom de Famile">
                        </label>
                        </div>
                   
                    
                        <div>
                            <label for="Prénom">Prénom :</label>
                            <input type="text" name="Prénom" id="Prénom" placeholder="Prénom">
                        
                        </div>
                    
                   
                        <div>
                            <label for="Age">Age :
                            <input type="number" name="Age" id="Age" placeholder="veullez entrez votre age" min="0" max="120">
                        </label>
                        </div>
                        
                    
                        <div>
                            <label for="Date de naissance">Date de naissance :
                            <input type="date" name="date" id="Date de naissance" placeholder="veullez entrez votre date de naissance">
                        </label>
                        </div>
                        <div>
                        <label for="Adresse Email">Adresse Email :
                            <input type="email" name="Adresse Email" id="Adresse Email" placeholder="Veuillez entrez votre adresse email">
                        </label>
                        </div>
                        
                         <label for="Numéro de téléphone">Numéro de téléphone :</label>
                            <div class="abd">
                            <input type="number" name="numero" id="Numéro de téléphone" placeholder="veullez entrez votre Numéro de telephone">
                        </div>
                        <div>
                        <label for="Note">Note :</label>
                            <input type="range" name="Note" id="Note">
                        
                        </div>
                        <div>
                            <label for="sexe">Sexe :
                            <input type="radio" name="sexe" value="Femmme" > F
                                <input type="radio" value="homme"> H
                                    <input type="radio" value="homme"> A
                                </label>
                            </div>
                            <div>
                            <label for="Plats préférés">Plats préférés :
                            <input type="checkbox" value="Atassi" name="plat" id="Plats préférés"> Atassi
                            <input type="checkbox" value="Atassi" name="plat" id="Plats préférés"> Abobo 
                            <input type="checkbox" value="Atassi" name="plat" id="Plats préférés"> Djongoli
                            <input type="checkbox" value="Atassi" name="plat" id="Plats préférés"> Come
                            <input type="checkbox" value="Atassi" name="plat" id="Plats préférés"> Garba
                        </label>
                        </div>
                        <div>
                        <label for="Commentaire">Commentaire :
                            <input type="text" id="Commentaire">
                        </label>
                        </div>
                        <div>
                        <label for="Mot de passe">Mot de passe :
                            <input type="password" name="Mot de passe" id="Mot de passe" placeholder="Veuillez entrez votre putin de mot de passe">
                        </label>
                        </div>
                        <div>
                            <label for="Fichier">Fichier :
                            <input type="file" name="Fichier" id="Fichier">
                        </label>
                        </div>
                        <div>
                           <input type="submit" value="Soumettre">
                           <input type="reset" value="Réinitialiser"> 
                        </div>    
                </table>
           </form>
        </div>
    </section>
   </main>
   <footer>
    <img src="images/logo.png" alt="logo Robbie Lens">

    <a href="x.com"target="_blank" class="lien-icone">
        <img src="images/twitter.png" alt="logo twitter">
    </a>

    <a href="www.instagram.com"target="_blank" class="lien-icone">
        <img src="images/instagram.png" alt="logo instagram">
    </a>
</footer>

</body>
</html>
